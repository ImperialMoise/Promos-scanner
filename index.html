<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ironsworn Companion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Ironsworn</h1>
        <input type="text" id="char-name" placeholder="Nom du Personnage" />
    </header>

    <section id="dice-section">
            <h2>Moteur de Résolution</h2>
            <div class="roll-controls">
                <select id="stat-selector">
                    <option value="edge">Vivacité</option>
                    <option value="heart">Cœur</option>
                    <option value="iron">Fer</option>
                    <option value="wits">Astuce</option>
                    <option value="shadow">Ombre</option>
                </select>
                <input type="number" id="modifier" value="0" title="Ajouts éventuels (+1, +2...)" style="width: 40px;">
                <button id="roll-btn">Lancer l'Action</button>
            </div>
            
            <div id="roll-result" class="hidden">
                <div class="dice-display">
                    <div class="action-die-box">
                        <span id="action-die-val">0</span> (d6) + <span id="stat-val">0</span> (carac+ajout) = <strong id="action-total">0</strong>
                    </div>
                    <div class="vs">CONTRE</div>
                    <div class="challenge-dice-box">
                        <span class="challenge-die" id="challenge1">0</span>
                        <span class="challenge-die" id="challenge2">0</span>
                    </div>
                </div>
                <h3 id="outcome-text">Résultat</h3>
                <button id="burn-momentum-btn" class="hidden">Brûler l'Élan !</button>
            </div>
        </section>

    <main>
        <section id="stats-section">
            <h2>Caractéristiques</h2>
            <div class="stats-grid">
                <div class="stat-box">
                    <label>Vivacité</label>
                    <input type="number" id="stat-edge" value="1" min="1" max="4">
                </div>
                <div class="stat-box">
                    <label>Cœur</label>
                    <input type="number" id="stat-heart" value="1" min="1" max="4">
                </div>
                <div class="stat-box">
                    <label>Fer</label>
                    <input type="number" id="stat-iron" value="1" min="1" max="4">
                </div>
                <div class="stat-box">
                    <label>Astuce</label>
                    <input type="number" id="stat-wits" value="1" min="1" max="4">
                </div>
                <div class="stat-box">
                    <label>Ombre</label>
                    <input type="number" id="stat-shadow" value="1" min="1" max="4">
                </div>
            </div>
        </section>
        <section id="tracks-section">
            <h2>Jauges</h2>
            <div class="tracks-grid">
                <div class="track-box">
                    <label>Santé</label>
                    <input type="number" id="track-health" value="5" min="0" max="5">
                </div>
                <div class="track-box">
                    <label>Esprit</label>
                    <input type="number" id="track-spirit" value="5" min="0" max="5">
                </div>
                <div class="track-box">
                    <label>Provisions</label>
                    <input type="number" id="track-supply" value="5" min="0" max="5">
                </div>
                <div class="track-box momentum">
                    <label>Élan</label>
                    <input type="number" id="track-momentum" value="2" min="-6" max="10">
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
